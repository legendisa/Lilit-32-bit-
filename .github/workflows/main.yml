name: 32Bit APK Derleyici
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Java ve Sistem Paketleri
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev

      - name: Python ve Buildozer Kur
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: SDK Lisanslarini Onayla (Kritik Adim)
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Tüm lisansları en baştan kabul ediyoruz ki 'Broken pipe' vermesin
          yes | buildozer android p4a -- --help || true

      - name: APK Bas
        run: |
          # Log seviyesini 2 yaparak hatayı daha net görelim
          buildozer -v android debug
        continue-on-error: false

      - name: Dosyayı Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Lilit-32Bit-Ciktisi
          path: bin/*.apk
