name: 32Bit APK Derleyici
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sistem Paketleri
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev

      - name: Buildozer Hazırla
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: APK Bas
        run: yes | buildozer -v android debug

      - name: Dosyayı Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Lilit-32Bit-Ciktisi
          path: bin/*.apk
